# TMDB: Heroku에 TMDB_API_KEY 미설정 시 Circular reference 방지를 위해 기본값 빈 문자열 사용. 설정 시 영화 API 동작.
tmdb:
  auth:
    api-key: ${TMDB_API_KEY:}
    access-token: ${TMDB_ACCESS_TOKEN:}
  api:
    movie-lists:
      now-playing: https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY:}&with_release_type=5
      movie-playing: https://api.themoviedb.org/3/movie/now_playing?api_key=${TMDB_API_KEY:}
      popular: https://api.themoviedb.org/3/movie/popular?api_key=${TMDB_API_KEY:}
      top-rated: https://api.themoviedb.org/3/movie/top_rated?api_key=${TMDB_API_KEY:}
      upcoming: https://api.themoviedb.org/3/movie/upcoming?api_key=${TMDB_API_KEY:}
    movie-details: https://api.themoviedb.org/3/movie/{movie_id}?api_key=${TMDB_API_KEY:}&language=ko-KR
    movie-credits: https://api.themoviedb.org/3/movie/{movie_id}/credits?api_key=${TMDB_API_KEY:}
    movie-release-dates: https://api.themoviedb.org/3/movie/{movie_id}/release_dates?api_key=${TMDB_API_KEY:}
    movie-videos: https://api.themoviedb.org/3/movie/{movie_id}/videos?api_key=${TMDB_API_KEY:}&language=ko-KR
    movie-providers: https://api.themoviedb.org/3/movie/{movie_id}/watch/providers?api_key=${TMDB_API_KEY:}
    movie-recommendations: https://api.themoviedb.org/3/movie/{movie_id}/recommendations?api_key=${TMDB_API_KEY:}&language=ko-KR&page=1
    movie-reviews: https://api.themoviedb.org/3/movie/{movie_id}/reviews?api_key=${TMDB_API_KEY:}&language=ko-KR&page=1
    trending-week: https://api.themoviedb.org/3/trending/movie/week?api_key=${TMDB_API_KEY:}

# 한국관광공사 데이터랩 & 파생 API (2026-04 기준 Base URL + operation 명까지 확정)
# 공공데이터포털 등록 경로 / 점검 결과:
#   15101972 관광빅데이터 정보서비스_GW   → DataLabService            (활성: metcoRegnVisitrDDList 광역 방문자수)
#   15152138 지역별 관광 자원 수요        → AreaTarResDemService       (operation 확정 — areaTarSvcDemList / areaCulResDemList, 2026-04 현재 totalCount=0 적재 대기)
#   15151365 지역별 관광 다양성           → AreaTarDivService          (operation 3종 확정 — areaTouDivList / areaExpDivList / areaIntlDivList, totalCount=0 적재 대기)
#   15128555 관광지 집중률 방문자 추이 예측 → TatsCnctrRateService     (활성 확인: tatsCnctrRatedList, 미래 7일 기초지자체 관광지 집중률 예측. 파라미터 areaCd+signguCd 필수, tAtsNm 선택)
#   15145706 관광공모전(사진) 수상작 정보  → PhokoAwrdService          (활성: phokoAwrdList / ldongCode)
# 필수 파라미터 규약
#   - DataLabService 계열: serviceKey, MobileOS=ETC, MobileApp, startYmd, endYmd, numOfRows, pageNo
#   - AreaTarDivService : serviceKey, MobileOS, MobileApp, baseYm(YYYYMM), areaCd(광역 법정동 2자리)
#   - AreaTarResDem     : 위와 동일 + 일부 operation 은 signguCd 추가
#   - TatsCnctrRate     : serviceKey, MobileOS, MobileApp, areaCd, signguCd (날짜/관광지 자동)
# TourIndex 조인 전제: DataLabHttpClient 가 내부에서 lDongRegnCd(11,26,...) → KorService2 areaCode(1~8,31~39) 로
# 변환 후 저장. 이 규약을 깨는 신규 오퍼레이션은 반드시 동일 변환을 거쳐야 한다.
visitkorea:
  auth:
    service-key: ${VISITKOREA_SERVICE_KEY:}
  # 영문 관광정보 서비스 (한국관광공사_영문_관광정보서비스_GW, 공공데이터 Base URL: apis.data.go.kr/B551011/EngService2)
  # 국문 KorService2 와 오퍼레이션 스펙이 거의 동일하며(areaCode/contentTypeId/contentId 공통 키),
  # 응답 메타(title/addr1/overview 등) 만 영문으로 내려온다. 외국인 사용자(영어 모드)가 선택한
  # 촬영지·배경지·주변 여행 POI 를 영문으로 탐색할 수 있게 연결한다.
  # - 서비스 키는 일반적으로 국문과 동일한 일반인증키로도 동작하지만, 일부 발급 이력은 별도 키라
  #   기본 전략은 VISITKOREA_ENG_SERVICE_KEY 를 우선 사용하고 미설정 시 공용 VISITKOREA_SERVICE_KEY 로 fallback.
  # - 지원 오퍼레이션(Phase 1 에서 사용): areaBasedList2 / locationBasedList2 / searchKeyword2 / detailCommon2
  eng:
    auth:
      service-key: ${VISITKOREA_ENG_SERVICE_KEY:${VISITKOREA_SERVICE_KEY:}}
    base-url: https://apis.data.go.kr/B551011/EngService2
    area-based: ${visitkorea.eng.base-url}/areaBasedList2
    location-based: ${visitkorea.eng.base-url}/locationBasedList2
    search-keyword: ${visitkorea.eng.base-url}/searchKeyword2
    detail-common: ${visitkorea.eng.base-url}/detailCommon2
    cache-minutes: 360
  api:
    base-url: https://apis.data.go.kr/B551011/DataLabService
    # 광역 지자체 방문자수 (metcoRegnVisitrDDList) - 활성. 응답의 areaCode 는 11,26,... 이며
    # 클라이언트가 KorService2 체계로 변환한 뒤 tour_index_snapshots 에 upsert 한다.
    tour-demand-index: ${visitkorea.api.base-url}/metcoRegnVisitrDDList
    # 기초 지자체 방문자수 (locgoRegnVisitrDDList) - 현재 비활성.
    # 활성 시 signguCode(5자리) 를 광역 2자리로 집계 후 저장해야 함 (regionKey 로직 이미 지원).
    tour-competitiveness: ""
    # 지역 관광 서비스/문화자원 수요 — 엔드포인트 연결 확인. 단, 2026-04 시점 totalCount=0 으로
    # 지속 응답되어 KTO 측 데이터 적재 전. 적재 확인 시 아래 2개 URL 을 채워 활성화.
    # ${visitkorea.api.area-demand-base}/areaTarSvcDemList, .../areaCulResDemList
    cultural-resource-demand: ""
    tour-search-volume: ""
  # 지역별 관광 자원 수요 (AreaTarResDemService) - 활성화 대기용
  area-demand:
    base-url: https://apis.data.go.kr/B551011/AreaTarResDemService
    service-demand: ${visitkorea.area-demand.base-url}/areaTarSvcDemList
    cultural-demand: ${visitkorea.area-demand.base-url}/areaCulResDemList
  # 지역별 관광 다양성 (AreaTarDivService) - operation 3종 확정
  #   areaTouDivList : 관광객(방문자) 다양성
  #   areaExpDivList : 관광소비(지출) 다양성
  #   areaIntlDivList: 외국인 관광 다양성
  # 2026-04 현재 세 operation 모두 resultCode=0000 이지만 totalCount=0 (KTO 데이터 적재 대기).
  diversity:
    base-url: https://apis.data.go.kr/B551011/AreaTarDivService
    tourist-diversity: ${visitkorea.diversity.base-url}/areaTouDivList
    consumption-diversity: ${visitkorea.diversity.base-url}/areaExpDivList
    intl-diversity: ${visitkorea.diversity.base-url}/areaIntlDivList
  # 관광지 집중률 방문자 추이 예측 (TatsCnctrRateService) - 활성 확인
  #   tatsCnctrRatedList : areaCd(2자리) + signguCd(5자리) 필수, tAtsNm(관광지명) 선택.
  #   응답: baseYmd, areaCd, areaNm, signguCd, signguNm, tAtsNm, cnctrRate (오늘 기준 향후 7일 예측)
  concentration:
    base-url: https://apis.data.go.kr/B551011/TatsCnctrRateService
    concentration-rate: ${visitkorea.concentration.base-url}/tatsCnctrRatedList
  # 매 일 호출을 상한하기 위한 일일 배치 기준 값
  batch:
    default-period-days: 7
    page-size: 100
  # 관광공모전(사진) 수상작 정보 (공공데이터 15145706)
  # https://apis.data.go.kr/B551011/PhokoAwrdService
  # 엔드포인트: /phokoAwrdList (수상작 리스트), /ldongCode (법정동 광역 코드)
  # 필수: serviceKey, MobileOS=ETC, MobileApp, numOfRows, pageNo
  # 선택 필터: lDongRegnCd (예: 11=서울, 48=경남)
  phoko:
    base-url: https://apis.data.go.kr/B551011/PhokoAwrdService
    award-list: ${visitkorea.phoko.base-url}/phokoAwrdList
    ldong-code: ${visitkorea.phoko.base-url}/ldongCode
    cache-minutes: 1440
  # 무장애 여행정보 (공공데이터 포털 Base URL: apis.data.go.kr/B551011/KorWithService2)
  # - areaBasedList2     : 지역/콘텐츠타입 기반 무장애 POI 목록
  # - locationBasedList2 : 좌표(경·위도) 반경 기반 무장애 POI 목록 (CineTrip 촬영지 주변 탐색)
  # - searchKeyword2     : 키워드 검색 (영화 제목 / 촬영지명 매칭 실험용)
  # - detailWithTour2    : 콘텐츠ID 무장애 상세 (휠체어·점자블록·수유실 등 편의시설 원문)
  # 필수 파라미터: serviceKey, MobileOS=ETC, MobileApp, numOfRows, pageNo,
  #               areaBased → areaCode + contentTypeId,
  #               locationBased → mapX/mapY/radius(m) + contentTypeId,
  #               searchKeyword → keyword,
  #               detailWithTour → contentId + contentTypeId
  # 주의: VISITKOREA_SERVICE_KEY 단일 키를 5개 서비스가 공유하므로 QPS 초과 방지 위해
  #       어댑터 내부에서 6시간 TTL 캐시 + 페이지당 50건 제한 (MAX_PAGE_SIZE).
  access:
    base-url: https://apis.data.go.kr/B551011/KorWithService2
    area-based: ${visitkorea.access.base-url}/areaBasedList2
    location-based: ${visitkorea.access.base-url}/locationBasedList2
    search-keyword: ${visitkorea.access.base-url}/searchKeyword2
    # detailCommon2  : 공통정보 (title/addr/overview/homepage/firstimage)
    # detailIntro2   : 소개정보 (콘텐츠타입별 운영시간/주차/입장료 등)
    # detailInfo2    : 반복정보 (장애유형별 편의시설 리스트 — infoname/infotext)
    # KorService v1 의 detailWithTour 는 v2 에 존재하지 않으므로 세 엔드포인트를 조합.
    detail-common: ${visitkorea.access.base-url}/detailCommon2
    detail-intro: ${visitkorea.access.base-url}/detailIntro2
    detail-info: ${visitkorea.access.base-url}/detailInfo2
    cache-minutes: 360
  # 반려동물 동반여행 정보 (공공데이터 포털 Base URL: apis.data.go.kr/B551011/KorPetTourService2)
  # ※ KTO 2026-01-09 공지: 기존 KorPetTourService 는 폐기되고 KorPetTourService2 로 이전됨.
  #   (data.go.kr NOTICE_0000000004471) 구 URL 호출 시 404 "API not found" 반환.
  # - areaBasedList2     : 지역/콘텐츠타입 기반 반려동물 친화 POI 목록
  # - locationBasedList2 : 좌표(경·위도) 반경 기반 반려동물 친화 POI 목록
  # - searchKeyword2     : 키워드 검색
  # - detailCommon2      : 콘텐츠 공통 정보(title/addr/overview/homepage/firstimage)
  # - detailPetTour2     : 반려동물 동반 정책 세부 (acmpyTypeCd / acmpyNeedMtr / etiquetteMtr ...)
  # 필수 파라미터: serviceKey, MobileOS=ETC, MobileApp, numOfRows, pageNo,
  #               areaBased → areaCode + contentTypeId,
  #               locationBased → mapX/mapY/radius(m) + contentTypeId,
  #               searchKeyword → keyword,
  #               detailCommon/PetTour → contentId + contentTypeId
  # 지원 contentTypeId: 12(관광지) / 14(문화시설) / 28(레포츠) / 32(숙박) / 38(쇼핑) / 39(음식점)
  pet:
    base-url: https://apis.data.go.kr/B551011/KorPetTourService2
    area-based: ${visitkorea.pet.base-url}/areaBasedList2
    location-based: ${visitkorea.pet.base-url}/locationBasedList2
    search-keyword: ${visitkorea.pet.base-url}/searchKeyword2
    detail-common: ${visitkorea.pet.base-url}/detailCommon2
    detail-pet-tour: ${visitkorea.pet.base-url}/detailPetTour2
    cache-minutes: 360
    warmer-enabled: true
  # 관광사진갤러리 (PhotoGalleryService1) - 공공데이터 15145630
  # Base URL: apis.data.go.kr/B551011/PhotoGalleryService1
  # 오퍼레이션: /galleryList1 (전체 목록), /gallerySearchList1 (키워드 검색),
  #            /galleryDetailList1 (제목 기준 상세), /gallerySyncDetailList1 (동기화)
  # 필수: serviceKey, MobileOS=ETC, MobileApp, numOfRows, pageNo
  # 선택(search): keyword
  # 일일 트래픽 1,000회 상한 → 24h in-memory 캐시 + 키워드별 캐시(최대 64개) 사용.
  # 주의: PhotoGalleryService1 은 공용 VISITKOREA_SERVICE_KEY 와 별도 활용신청이 필요하므로
  #       VISITKOREA_GALLERY_API_KEY 를 독립 env 로 분리. 미설정 시 어댑터가 isConfigured=false
  #       로 판정하여 모든 엔드포인트는 빈 리스트를 반환(섹션 자연 숨김).
  gallery:
    base-url: https://apis.data.go.kr/B551011/PhotoGalleryService1
    api-key: ${VISITKOREA_GALLERY_API_KEY:${VISITKOREA_SERVICE_KEY:}}
    list-url: ${visitkorea.gallery.base-url}/galleryList1
    search-url: ${visitkorea.gallery.base-url}/gallerySearchList1
    cache-minutes: 1440
  # 고캠핑 정보 조회서비스 (GoCamping) - 공공데이터 기반 전국 야영장/글램핑/카라반 DB
  # Base URL: apis.data.go.kr/B551011/GoCamping
  # 오퍼레이션:
  #   - /basedList         : 기본 목록 (전국 전체, 최신순)
  #   - /locationBasedList : 좌표 기반 주변 조회 (mapX 경도, mapY 위도, radius 미터)
  #   - /searchList        : 키워드 검색 (야영장명/지역명)
  #   - /imageList         : contentId 별 이미지 목록 (추후 상세 페이지에서 사용)
  # 필수: serviceKey, MobileOS=ETC, MobileApp, numOfRows, pageNo
  # 선택(location): mapX / mapY / radius(m, 최대 20000)
  # 선택(search)  : keyword
  # 일일 트래픽 1,000회 상한 → 24h in-memory 캐시 + 1페이지 동기/잔여 백그라운드 적재 (PhotoGalleryService1 과 동일 전략).
  # 주의: GoCamping 도 별도 활용신청이 필요. GOCAMPING_API_KEY 를 독립 env 로 분리 ·
  #       미설정 시 VISITKOREA_SERVICE_KEY 로 fallback. 둘 다 비어 있으면 isConfigured=false 로
  #       빈 리스트 반환 → UI 섹션/페이지가 섹션 자동 숨김.
  camping:
    base-url: https://apis.data.go.kr/B551011/GoCamping
    api-key: ${GOCAMPING_API_KEY:${VISITKOREA_SERVICE_KEY:}}
    based-url: ${visitkorea.camping.base-url}/basedList
    location-url: ${visitkorea.camping.base-url}/locationBasedList
    search-url: ${visitkorea.camping.base-url}/searchList
    image-url: ${visitkorea.camping.base-url}/imageList
    cache-minutes: 1440
  # 웰니스관광정보 서비스 (WellnessTursmService) - 온천/스파/힐링숲/템플스테이/명상/요가 등
  # Base URL: apis.data.go.kr/B551011/WellnessTursmService
  # 오퍼레이션 (1차 사용):
  #   - /areaBasedList    : 지역기반 전국 웰니스 관광정보 (전체/지역코드별)
  #   - /locationBasedList: 좌표 기반 주변 웰니스 (mapX 경도, mapY 위도, radius 미터)
  #   - /searchKeyword    : 키워드 검색 (예: 온천, 스파, 템플스테이, 명상)
  # 추후 확장:
  #   - /detailCommon     : 공통정보 (overview/homepage/firstimage)
  #   - /detailIntro      : 소개정보 (운영시간/주차/요금)
  #   - /detailImage      : 이미지 URL 목록
  # 주의: KTO 공용 VISITKOREA_SERVICE_KEY 와 활용신청이 별도로 필요할 수 있어 WELLNESS_API_KEY 를
  #       분리해두고 미설정 시 VISITKOREA_SERVICE_KEY 로 fallback. 둘 다 없으면 isConfigured=false
  #       로 빈 리스트 반환 → UI 섹션 자동 숨김.
  wellness:
    base-url: https://apis.data.go.kr/B551011/WellnessTursmService
    api-key: ${WELLNESS_API_KEY:${VISITKOREA_SERVICE_KEY:}}
    area-url: ${visitkorea.wellness.base-url}/areaBasedList
    location-url: ${visitkorea.wellness.base-url}/locationBasedList
    search-url: ${visitkorea.wellness.base-url}/searchKeyword
    detail-common-url: ${visitkorea.wellness.base-url}/detailCommon
    detail-image-url: ${visitkorea.wellness.base-url}/detailImage
    cache-minutes: 1440
  # 두루누비 정보 서비스 GW (공공데이터 15101974, TourAPI Guide v4.1)
  # Base URL: apis.data.go.kr/B551011/Durunubi
  # 공식 오퍼레이션 2종:
  #   - courseList : 코스 목록 정보 조회 (코리아둘레길 284개 코스. GPX·지역·난이도·거리·주변 관광지 포함)
  #   - routeList  : 길 목록 정보 조회 (해파랑길/남파랑길/서해랑길/DMZ 평화의 길 등 상위 브랜드)
  # 필수 파라미터: serviceKey, MobileOS=ETC, MobileApp, numOfRows, pageNo
  # courseList 선택 필터: brdDiv(DNWW/DNBW/DNHW/DNJJ 등), routeIdx, crsKorNm(코스명 부분검색)
