spring:
  datasource:
    hikari:
      # 로컬: Docker MySQL (DB_HOST 미설정 시 localhost). Heroku: JawsDB/ClearDB 등 추가 후 DB_HOST, DB_PORT, DB_NAME 설정
      jdbc-url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:netplix}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&useSSL=${DB_USE_SSL:false}&allowPublicKeyRetrieval=true
      driver-class-name: com.mysql.cj.jdbc.Driver
      username: ${DB_USERNAME:root}
      # 로컬: DB_PASSWORD 미설정 시 빈 문자열(비밀번호 없음) 시도. 프로필 local 이면 application-local.yml에서 admin 등 지정
      password: ${DB_PASSWORD:}
      maximum-pool-size: ${DB_MAX_POOL_SIZE:5}
      minimum-idle: ${DB_MIN_IDLE:1}
      connection-timeout: 30000
  jpa:
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    hibernate:
      # 기본값은 validate (로컬 dev 안전성 유지).
      # 운영(Heroku)에서는 JPA_DDL_AUTO=none 로 override 해서 매 기동 INFORMATION_SCHEMA 조회(엔티티 수 만큼 쿼리) 제거.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    generate-ddl: false
    open-in-view: false
    # 운영(Heroku)에서는 SHOW_SQL=false 로 override 해서 로그 볼륨 절감.
    show-sql: ${SHOW_SQL:true}
  flyway:
    locations: classpath:flyway
    baseline-on-migrate: true
    baseline-version: 1
    # 기본값은 true (로컬 dev 는 web 기동 시 migrate 수행).
    # 운영(Heroku)에서는 FLYWAY_ENABLED_ON_START=false 로 override 해서 web dyno 재기동 시 Flyway 재검증 쿼리 제거.
    # (release phase 에서 이미 MigrateApplication 이 Flyway 를 실행함 — Procfile 참조)
    enabled: ${FLYWAY_ENABLED_ON_START:true}
