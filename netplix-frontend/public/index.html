    <script>
      (function(){
        var s = typeof location !== 'undefined' && location.search || '';
        if (s.indexOf('token=') !== -1) {
          try {
            var params = new URLSearchParams(s);
            var t = params.get('token');
            var r = params.get('refresh_token');
            if (t) {
              localStorage.setItem('token', t);
              if (r) localStorage.setItem('refresh_token', r);
              sessionStorage.setItem('oauth_callback_ts', Date.now().toString());
              var base = location.origin;
              if (location.origin === 'null' || !location.origin || location.protocol === 'capacitor:') {
                base = 'https://touraz-dvdholic-2507bcb348dd.herokuapp.com';
              }
              window.location.replace(base + '/dashboard');
              return;
            }
          } catch(e) {}
        }
      })();
    </script>
